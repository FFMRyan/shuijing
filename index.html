  /* ============ Picker collapse / expand ============ */
  (function setupPickerGrip() {
    const picker = document.querySelector('.picker');
    const grip = document.getElementById('picker-grip');
    if (!picker || !grip) return;

    let startY = null;
    let moved = false;
    let activePtr = null;

    function togglePicker(force) {
      const collapsed = force !== undefined ? force : !picker.classList.contains('collapsed');
      picker.classList.toggle('collapsed', collapsed);
    }

    grip.addEventListener('pointerdown', e => {
      startY = e.clientY;
      moved = false;
      activePtr = e.pointerId;
      try { grip.setPointerCapture(activePtr); } catch (_) {}
    });
    grip.addEventListener('pointermove', e => {
      if (startY === null || e.pointerId !== activePtr) return;
      if (Math.abs(e.clientY - startY) > 6) moved = true;
    });
    grip.addEventListener('pointerup', e => {
      if (startY === null || e.pointerId !== activePtr) return;
      const dy = e.clientY - startY;
      startY = null;
      activePtr = null;
      if (!moved) {
        togglePicker();              // tap → toggle
      } else if (Math.abs(dy) > 28) {
        togglePicker(dy > 0);        // drag down → collapse, drag up → expand
      }
    });
    grip.addEventListener('pointercancel', () => {
      startY = null; moved = false; activePtr = null;
    });
  })();

  /* ============ Bead action chip · 替换 / 删除 (非阻塞胶囊) ============ */
  let actionIdx = -1;
  let replaceIdx = -1;

  function renderBeadChip() {
    const chip = document.getElementById('bead-action-chip');
    if (actionIdx < 0 || actionIdx >= bracelet.length) {
      chip.classList.remove('show', 'replacing');
      return;
    }
    const c = findItem(bracelet[actionIdx].id);
    if (!c) { chip.classList.remove('show', 'replacing'); return; }
    const dot = document.getElementById('bead-chip-dot');
    dot.style.background = `radial-gradient(circle at 35% 30%, ${c.glow}, ${c.color})`;
    dot.style.color = c.glow;
    const label = document.getElementById('bead-chip-label');
    if (replaceIdx === actionIdx) {
      label.textContent = `替换「${c.name}」· 请从下方选择`;
      chip.classList.add('replacing');
    } else {
      label.textContent = `第 ${actionIdx + 1} 颗 · ${c.name}`;
      chip.classList.remove('replacing');
    }
    chip.classList.add('show');
  }

  /* ============ Bead drag · 长按拖动重排珠子 ============ */
  // dragState 在拖拽期间记录:被拖珠子的当前 index、光标屏幕坐标、是否已超过阈值进入拖拽态
  let dragState = null;

  function startBeadDrag(e, idx) {
    if (idx < 0 || idx >= bracelet.length) return;
    dragState = {
      origIdx: idx,
      currentIdx: idx,
      startX: e.clientX,
      startY: e.clientY,
      lastClientX: e.clientX,
      lastClientY: e.clientY,
      moved: false,
      pointerId: e.pointerId
    };
    document.addEventListener('pointermove', onBeadDragMove);
    document.addEventListener('pointerup', onBeadDragEnd);
    document.addEventListener('pointercancel', onBeadDragEnd);
    e.preventDefault();
    e.stopPropagation();
  }

  let dragRafId = null;
  function onBeadDragMove(e) {
    if (!dragState || e.pointerId !== dragState.pointerId) return;
    const dx = e.clientX - dragState.startX;
    const dy = e.clientY - dragState.startY;
    if (!dragState.moved && Math.hypot(dx, dy) > 8) dragState.moved = true;
    if (!dragState.moved) return;

    // 每次 pointermove 都更新浮珠最新屏幕坐标 (轻量),但渲染统一交给 rAF 合并到 60fps
    dragState.lastClientX = e.clientX;
    dragState.lastClientY = e.clientY;
    if (dragRafId !== null) return;
    dragRafId = requestAnimationFrame(() => {
      dragRafId = null;
      if (!dragState || !dragState.moved) return;

      // 把当前光标位置换算成手串圆环上的角度,定位最近槽位
      const svg = document.getElementById('bracelet-svg');
      if (!svg) return;
      const rect = svg.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      let theta = Math.atan2(dragState.lastClientY - cy, dragState.lastClientX - cx) + Math.PI / 2;
      theta = (theta + Math.PI * 2) % (Math.PI * 2);
      const n = bracelet.length;
      if (n <= 1) { renderBracelet(); return; }
      const targetIdx = Math.round((theta / (Math.PI * 2)) * n) % n;

      if (targetIdx !== dragState.currentIdx && targetIdx >= 0 && targetIdx < n) {
        // 重排数组 — 把珠子从旧位置取出并插入到新位置,中间的珠子自动让位
        const item = bracelet.splice(dragState.currentIdx, 1)[0];
        bracelet.splice(targetIdx, 0, item);
        dragState.currentIdx = targetIdx;
        if (actionIdx >= 0) actionIdx = targetIdx;
      }
      // 拖拽期间只移动既有节点的位置(CSS 过渡自动播放),不全量重建 DOM —— 避免闪动
      updateBeadPositionsDuringDrag();
    });
  }

  // 拖拽期间增量更新:仅按 uid 找到既存 DOM,改写其 cx/cy/x/y。
  // 浏览器对 SVG 几何属性应用 CSS transition,所以让位动作平滑流畅,且无 DOM 重建闪烁。
  function updateBeadPositionsDuringDrag() {
    const svg = document.getElementById('bracelet-svg');
    if (!svg) return;
    const cx = 180, cy = 180, ringR = 130;
    const n = bracelet.length;
    if (n === 0) return;
    const baseR = n <= 8 ? 26 : n <= 12 ? 23 : n <= 14 ? 20 : n <= 16 ? 18 : 16;

    let floatPt = null;
    if (dragState && dragState.moved) {
      try { floatPt = clientToSvgPoint(svg, dragState.lastClientX, dragState.lastClientY); }
      catch (_) { floatPt = null; }
    }
    const dragIdx = dragState ? dragState.currentIdx : -1;

    bracelet.forEach((bead, i) => {
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      const slotX = cx + Math.cos(angle) * ringR;
      const slotY = cy + Math.sin(angle) * ringR;
      const r = baseR * (bead.size / 10);
      const isDrag = i === dragIdx && !!floatPt;
      const rr = isDrag ? r * 1.18 : r;
      const px = isDrag ? floatPt.x : slotX;
      const py = isDrag ? floatPt.y : slotY;

      // 命中圆(hit)
      const hit = svg.querySelector(`circle[data-uid="${bead.uid}"][data-kind="hit"]`);
      if (hit) {
        hit.setAttribute('cx', px);
        hit.setAttribute('cy', py);
        hit.setAttribute('r', rr);
        hit.style.transformOrigin = `${px}px ${py}px`;
        hit.style.cursor = isDrag ? 'grabbing' : 'grab';
        if (isDrag) hit.classList.add('dragging-bead'); else hit.classList.remove('dragging-bead');
      }
      // 图片
      const img = svg.querySelector(`image[data-uid="${bead.uid}"][data-kind="img"]`);
      if (img) {
        img.setAttribute('x', px - rr);
        img.setAttribute('y', py - rr);
        img.setAttribute('width', 2 * rr);
        img.setAttribute('height', 2 * rr);
        img.style.transformOrigin = `${px}px ${py}px`;
        if (isDrag) img.classList.add('dragging-bead'); else img.classList.remove('dragging-bead');
      }
      // 配饰(charm,<g>)
      const charm = svg.querySelector(`g[data-uid="${bead.uid}"][data-kind="charm"]`);
      if (charm) {
        const scale = (rr * 2) / 100;
        charm.setAttribute('transform', `translate(${px - rr} ${py - rr}) scale(${scale})`);
        if (isDrag) charm.classList.add('dragging-bead'); else charm.classList.remove('dragging-bead');
      }
    });

    // 被拖珠子放到最后(SVG z-order = 文档序),保证浮在最上层
    if (dragIdx >= 0 && dragIdx < n) {
      const uid = bracelet[dragIdx].uid;
      svg.querySelectorAll(`[data-uid="${uid}"]`).forEach(el => svg.appendChild(el));
    }
  }

  function onBeadDragEnd(e) {
    if (!dragState || (e && e.pointerId !== undefined && e.pointerId !== dragState.pointerId)) return;
    document.removeEventListener('pointermove', onBeadDragMove);
    document.removeEventListener('pointerup', onBeadDragEnd);
    document.removeEventListener('pointercancel', onBeadDragEnd);
    const { moved, origIdx } = dragState;
    dragState = null;
    if (!moved) {
      openBeadAction(origIdx);
    } else {
      // 落定后再渲染一次以清掉浮珠状态
      renderBracelet();
    }
  }

  // 屏幕坐标 → SVG 用户坐标
  function clientToSvgPoint(svg, clientX, clientY) {
    const pt = svg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }

  function openBeadAction(idx) {
    if (idx < 0 || idx >= bracelet.length) return;
    // Tapping the same bead twice dismisses
    if (actionIdx === idx && replaceIdx < 0) { cancelBeadAction(); return; }
    actionIdx = idx;
    replaceIdx = -1;
    renderBeadChip();
    renderBracelet();
  }

  function cancelBeadAction() {
    actionIdx = -1;
    replaceIdx = -1;
    document.getElementById('bead-action-chip').classList.remove('show', 'replacing');
    renderBracelet();
  }

  function beginReplace() {
    if (actionIdx < 0) return;
    replaceIdx = actionIdx;
    renderBeadChip();
    // 自动展开 picker,方便直接选新物品替换
    const picker = document.querySelector('.picker');
    if (picker && picker.classList.contains('collapsed')) {
      picker.classList.remove('collapsed');
    }
  }

  function confirmDelete() {
    if (actionIdx < 0) return;
    const idx = actionIdx;
    actionIdx = -1;
    replaceIdx = -1;
    document.getElementById('bead-action-chip').classList.remove('show', 'replacing');
    bracelet.splice(idx, 1);
    renderBracelet();
  }

  // Esc dismisses the chip
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && actionIdx >= 0) cancelBeadAction();
  });

  // Click anywhere outside the chip + bracelet SVG to dismiss the selection.
  // We use composedPath() instead of contains() because renderBracelet replaces
  // the SVG innerHTML inside openBeadAction — by the time this bubble-phase
  // listener runs, e.target is an orphaned node no longer attached anywhere.
  document.addEventListener('click', (e) => {
    if (actionIdx < 0) return;
    const path = e.composedPath ? e.composedPath() : [];
    const chip = document.getElementById('bead-action-chip');
    const svg = document.getElementById('bracelet-svg');
    if (chip && path.includes(chip)) return;   // chip buttons handle themselves
    if (svg && path.includes(svg)) return;     // bead taps already routed to openBeadAction
    cancelBeadAction();
  });

  /* ============ Toast / Copy / Share ============ */
  function toast(msg) {
    const t = document.getElementById('toast');
    if (!t) return;
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  function getBraceletSummary() {
    const counts = {};
    bracelet.forEach(b => { counts[b.id] = (counts[b.id] || 0) + 1; });
    const crystals = [], charms = [];
    Object.entries(counts).forEach(([id, n]) => {
      const item = findItem(id);
      if (!item) return;
      if (item.shape) charms.push({ ...item, n });
      else            crystals.push({ ...item, n });
    });
    crystals.sort((a, b) => b.n - a.n);
    charms.sort((a, b) => b.n - a.n);
    const elemCounts = {};
    ELEMENTS.forEach(e => elemCounts[e.key] = 0);
    bracelet.forEach(b => {
      const item = findItem(b.id);
      if (item && item.element) elemCounts[item.element]++;
    });
    return { crystals, charms, elemCounts, thread: getThreadStyle() };
  }

  function copyBraceletMd() {
    if (bracelet.length === 0) { toast('手串还是空的'); return; }
    const { crystals, charms, elemCounts, thread } = getBraceletSummary();
    const date = new Date().toLocaleDateString('zh-CN');
    let md = `# 水晶物语 · 我的手串\n\n> ${date}\n\n## 基本信息\n\n`;
    md += `- **总颗数**：${bracelet.length}\n- **绳线**：${thread.name}\n\n## 五行占比\n\n`;
    ELEMENTS.forEach(e => {
      const n = elemCounts[e.key];
      if (n > 0) md += `- **${e.key}** · ${n} 颗 · ${e.desc}\n`;
    });
    if (crystals.length) {
      const total = crystals.reduce((s, c) => s + c.n, 0);
      md += `\n## 水晶 (${total} 颗)\n\n`;
      crystals.forEach(c => {
        md += `- **${c.name}** × ${c.n}`;
        if (c.element) md += ` · ${c.element}`;
        if (c.effect)  md += ` · ${c.effect}`;
        md += `\n`;
      });
    }
    if (charms.length) {
      const total = charms.reduce((s, c) => s + c.n, 0);
      md += `\n## 配饰 (${total} 件)\n\n`;
      charms.forEach(c => {
        md += `- **${c.name}** × ${c.n}`;
        if (c.element) md += ` · ${c.element}`;
        md += `\n`;
      });
    }
    md += `\n---\n*水晶物语 · 编织属于你的专属手串*\n`;

    const fallback = () => {
      const ta = document.createElement('textarea');
      ta.value = md;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); toast('已复制 Markdown 到剪贴板'); }
      catch (e) { toast('复制失败,请手动复制'); }
      document.body.removeChild(ta);
    };
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(md).then(() => toast('已复制 Markdown 到剪贴板')).catch(fallback);
    } else {
      fallback();
    }
  }

  function openShareModal() {
    if (bracelet.length === 0) { toast('手串还是空的'); return; }
    populateShareContent();
    document.getElementById('share-overlay').classList.add('show');
  }
  function closeShareModal(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('share-overlay').classList.remove('show');
  }

  function populateShareContent() {
    const { crystals, charms, elemCounts, thread } = getBraceletSummary();
    const date = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });

    // Clone current bracelet SVG so the share modal shows the actual layout
    const orig = document.getElementById('bracelet-svg');
    const cloned = orig.cloneNode(true);
    cloned.removeAttribute('id');

    const elemHtml = ELEMENTS.filter(e => elemCounts[e.key] > 0).map(e => `
      <span class="share-elem" style="color:${e.color}; background:${hexAlpha(e.color, 0.1)}; border:1px solid ${hexAlpha(e.color, 0.35)}">
        <b>${e.key}·${elemCounts[e.key]}</b>${e.desc}
      </span>
    `).join('');

    const itemRow = (it) => {
      const elem = it.element ? ELEMENTS.find(e => e.key === it.element) : null;
      return `
        <div class="share-item-row">
          <span class="share-item-orb" style="background:radial-gradient(circle at 35% 30%, ${it.glow}, ${it.color}); color:${it.glow}"></span>
          <div class="share-item-info">
            <span class="share-item-name">${it.name}</span>${it.effect ? `<span class="share-item-effect">· ${it.effect}</span>` : ''}
          </div>
          ${elem ? `<span class="share-item-elem" style="color:${elem.color}">${elem.key}</span>` : ''}
          <span class="share-item-count">×${it.n}</span>
        </div>
      `;
    };

    const crystalTotal = crystals.reduce((s, c) => s + c.n, 0);
    const charmTotal   = charms.reduce((s, c) => s + c.n, 0);

    const html = `
      <h2 class="share-title">水 晶 物 语 · 我 的 手 串</h2>
      <p class="share-date">${date}</p>
      <div class="share-bracelet-wrap">${cloned.outerHTML}</div>
      <div class="share-section">
        <div class="share-section-title">五 行 占 比 · 共 ${bracelet.length} 颗</div>
        <div class="share-elem-list">${elemHtml || '<span class="share-item-effect">尚未编织</span>'}</div>
      </div>
      ${crystals.length ? `
        <div class="share-section">
          <div class="share-section-title">水 晶 · ${crystalTotal} 颗</div>
          ${crystals.map(itemRow).join('')}
        </div>` : ''}
      ${charms.length ? `
        <div class="share-section">
          <div class="share-section-title">配 饰 · ${charmTotal} 件</div>
          ${charms.map(itemRow).join('')}
        </div>` : ''}
      <div class="share-section">
        <div class="share-section-title">绳 线</div>
        <div class="share-item-row">
          <span class="share-item-orb" style="background:radial-gradient(circle at 35% 30%, ${thread.glow}, ${thread.color}); color:${thread.glow}"></span>
          <div class="share-item-info"><span class="share-item-name">${thread.name}</span></div>
        </div>
      </div>
      <p class="share-footer-text">水晶物语 · 编织属于你的专属手串</p>
    `;
    document.getElementById('share-content').innerHTML = html;
  }

  /* ============ Init ============ */
  renderElementRail();
  renderSizeRail();
  renderCategoryTabs();
  renderPicker();
  renderInfoPanel();
  renderBracelet();
</script>

<div class="bead-action-chip" id="bead-action-chip" role="dialog" aria-label="珠子操作">
  <span class="bead-chip-dot" id="bead-chip-dot"></span>
  <span class="bead-chip-label" id="bead-chip-label">--</span>
  <button class="bead-chip-btn replace" onclick="beginReplace()" id="bead-chip-replace">换</button>
  <button class="bead-chip-btn delete" onclick="confirmDelete()" id="bead-chip-delete">删</button>
</div>

<div class="share-mask" id="share-overlay" onclick="closeShareModal(event)" role="dialog" aria-label="分享手串">
  <div class="share-sheet" onclick="event.stopPropagation()">
    <div class="share-content" id="share-content"></div>
    <div class="share-actions">
      <button class="share-btn" onclick="closeShareModal()">关 闭</button>
      <button class="share-btn primary" onclick="copyBraceletMd()">复 制 详 情</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
</body>
</html>
